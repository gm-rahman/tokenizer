name: Build Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # No lockfile is committed, so install (not ci) and let npm resolve.
      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Package plugin
        run: |
          mkdir -p artifact/dist
          cp -r dist/. artifact/dist/
          cp manifest.json artifact/manifest.json
          cd artifact && zip -r ../figma-plugin.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: figma-token-generator-plugin
          path: figma-plugin.zip
